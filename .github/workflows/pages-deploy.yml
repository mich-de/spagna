name: Deploy
on:
  push:
    branches: [main, fix-deploy]
  workflow_dispatch:

permissions:
  contents: read
  pages: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build
        run: |
          npm ci
          npm run build
      - name: Upload
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out
      - name: Deploy
        uses: actions/deploy-pages@v4
